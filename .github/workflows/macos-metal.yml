name: macOS Metal backend

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  build_metal:
    name: Metal backend [macOS, LLVM 20]
    # macos-26 is specified explicitly: as of early 2026 it is in public preview
    # on GitHub Actions and is not yet selected by 'macos-latest'. We need it
    # because metal-cpp requires macOS 26 SDK (MTL::LanguageVersion4_0 etc.).
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: install dependencies
      run: |
        set +e
        brew update
        brew install llvm@20 lld@20 libomp boost ninja lit
        set -e

    - name: download metal-cpp
      run: |
        curl -L -o metal-cpp.zip https://developer.apple.com/metal/cpp/files/metal-cpp_26.zip
        unzip metal-cpp.zip -d ${GITHUB_WORKSPACE}/metal-cpp-extracted

    - name: build AdaptiveCpp
      run: |
        LLVM_PREFIX=$(brew --prefix llvm@20)
        LLD_PREFIX=$(brew --prefix lld@20)
        OMP_PREFIX=$(brew --prefix libomp)
        METAL_CPP_DIR=$(ls -d ${GITHUB_WORKSPACE}/metal-cpp-extracted/metal-cpp* | head -1)

        mkdir build && cd build
        cmake .. -GNinja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER=/usr/bin/clang \
          -DCMAKE_CXX_COMPILER=/usr/bin/clang++ \
          -DCLANG_EXECUTABLE_PATH=${LLVM_PREFIX}/bin/clang++ \
          -DLLVM_DIR=${LLVM_PREFIX}/lib/cmake/llvm \
          -DCMAKE_OSX_SYSROOT="$(xcrun --show-sdk-path)" \
          -DCMAKE_INSTALL_PREFIX=${GITHUB_WORKSPACE}/install \
          -DWITH_OPENCL_BACKEND=OFF \
          -DWITH_METAL_BACKEND=ON \
          -DACPP_COMPILER_FEATURE_PROFILE=full \
          -DACPP_LLD_PATH=${LLD_PREFIX}/bin/ld64.lld \
          -DMETAL_INCLUDE_DIR=${METAL_CPP_DIR} \
          -DSEQUENTIAL_LINK_LINE=${OMP_PREFIX}/lib/libomp.dylib \
          "-DOMP_LINK_LINE=-fopenmp ${OMP_PREFIX}/lib/libomp.dylib -L${OMP_PREFIX}/lib/" \
          "-DOMP_CXX_FLAGS=-fopenmp -D_ENABLE_EXTENDED_ALIGNED_STORAGE -I${OMP_PREFIX}/include"
        ninja install

    - name: build generic SSCP tests
      run: |
        mkdir ${GITHUB_WORKSPACE}/build/tests-sscp
        cd ${GITHUB_WORKSPACE}/build/tests-sscp
        cmake -GNinja \
          -DACPP_TARGETS="generic" \
          -DAdaptiveCpp_DIR=${GITHUB_WORKSPACE}/install/lib/cmake/AdaptiveCpp \
          -DWITH_PCUDA_TESTS=ON \
          ${GITHUB_WORKSPACE}/tests
        ninja

    - name: run Metal tests (sycl)
      run: |
        cd ${GITHUB_WORKSPACE}/build/tests-sscp
        DYLD_LIBRARY_PATH=${GITHUB_WORKSPACE}/install/lib ./sycl_tests

    - name: run Metal tests (pcuda)
      run: |
        cd ${GITHUB_WORKSPACE}/build/tests-sscp
        DYLD_LIBRARY_PATH=${GITHUB_WORKSPACE}/install/lib ./pcuda_tests

    - name: run Metal tests (lit sscp)
      run: |
        cd ${GITHUB_WORKSPACE}/build/tests-sscp
        DYLD_LIBRARY_PATH=${GITHUB_WORKSPACE}/install/lib \
        PATH=$(brew --prefix llvm@20)/bin:$PATH \
        ninja check-sscp

    - name: run Metal tests (lit reflection)
      run: |
        cd ${GITHUB_WORKSPACE}/build/tests-sscp
        DYLD_LIBRARY_PATH=${GITHUB_WORKSPACE}/install/lib \
        PATH=$(brew --prefix llvm@20)/bin:$PATH \
        ninja check-reflection

